experimental_monorepo_root = true

[monorepo]
config_roots = ["utils/snacks"]

[env]
MISE_EXPERIMENTAL = "1"

[tools]
stylua = "latest"
"aqua:Kampfkarren/selene" = "latest"
typos = "latest"
dprint = "latest"
actionlint = "latest"
zizmor = "latest"
shellcheck = "latest"
"cargo:nu-lint" = "latest"

[tasks.setup]
hide = true
confirm = "⚠️ This command will alter your system. Continue?"
description = "Setup the project"
depends = ["hooks"]

[tasks.audit]
# Extras, deep, thorough checks. Should be run locally.
hide = true
description = "Exhaustive quality check"
depends = ["check", "//:audit:*", "//utils/snacks:audit"]

[tasks.fix]
# Apply automatic fixes, then check.
# Intended for use before commit or push.
description = "Enforce rules"
depends = ["fmt", "check", "//utils/snacks:fix"]

[tasks.check]
# Quality check. Primarily used in CI.
hide = true
description = "Quality check"
depends = ["lint", "//utils/snacks:check"]

[tasks.lint]
# Minimal, fast feedback checks.
hide = true
description = "Lint"
depends = ["//:lint:*", "//utils/snacks:lint"]
run = [
    # format
    "dprint check",
    "stylua . --allow-hidden --check",
    # lint
    "selene . --quiet",
    # typos
    "typos",
]

[tasks.fmt]
hide = true
description = "Format"
run = ["dprint fmt", "stylua . --allow-hidden"]

[tasks."lint:shell"]
hide = true
description = "Lint shell scripts"
run = "grep -lE '^#!.*(bash|sh)$' bin/* .mise/tasks/* setups/scripts/* | xargs -r shellcheck"

[tasks."lint:nu"]
hide = true
description = "Lint Nushell code"
run = "nu-lint bin/"

[tasks.publish]
alias = "p"
description = "Publish configs and binaries"
depends = ["//utils/snacks:publish"]
run = "dotter deploy"

[tasks.up]
hide = true
description = "Upgrade dependencies"
depends = ["//utils/snacks:up"]
run = "dprint config update"

[tasks."audit:extras"]
hide = true
interactive = true
description = "Dependency analysis"
depends = ["//utils/snacks:audit:extras"]
run = [
    # Dependencies
    "pnpx actions-up",
    # GitHub CI
    "actionlint",
    "zizmor .github/workflows/*",
]

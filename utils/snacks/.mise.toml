[tools]
"cargo:cargo-nextest" = "latest"
"cargo:cargo-udeps" = "latest"
"cargo:cargo-audit" = "latest"
"cargo:cargo-outdated" = "latest"

[tasks.dev]
interactive = true
description = "Develop the app"
run = ["bacon", "mise run verify"]

[tasks.audit]
# Extras, deep, thorough checks. Should be run locally.
hide = true
description = "Exhaustive quality check"
depends = "check"

[tasks.fix]
# Apply automatic fixes, then check.
# Intended for use before commit or push.
description = "Enforce rules"
depends = ["fmt", "check"]

[tasks.check]
# Quality check. Primarily used in CI.
hide = true
description = "Quality check"
depends = ["lint", "test"]

[tasks.lint]
# Minimal, fast feedback checks.
hide = true
description = "Lint"
run = [
    # format
    "cargo fmt --all -- --check",
    "dprint check",
    # lint
    "cargo clippy --all-targets --all-features",
    # typos
    "typos",
]

[tasks.fmt]
hide = true
description = "Format the codebase"
run = [
    "cargo fmt --all",
    "dprint fmt",
]

[tasks."cargo:test"]
hide = true
description = "Test"
run = "cargo test --all-features"

[tasks."test"]
hide = true
description = "Test"
run = "cargo nextest run --all-features"

[tasks.publish]
alias = "p"
description = "Publish"
depends = ["lint", "test"]

[tasks."audit:extras"]
hide = true
description = "Dependency analysis"
run = [
    "cargo +nightly udeps --all-targets",
    "cargo audit",
    "cargo outdated --root-deps-only",
]

[tasks.up]
hide = true
description = "Upgrade dependencies"
run = [
    "cargo upgrade --incompatible --recursive --verbose",
    "cargo update",
    "dprint config update",
]

[tasks.ci]
# Some CI providers are slow; avoid pulling and compiling dependencies.
# Use regular cargo tools.
hide = true
description = "Quality check"
depends = "cargo:test"

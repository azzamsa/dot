name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  changelog:
    name: Generate changelog
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # required for git-cliff
          persist-credentials: false

      - name: Generate a changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        id: git-cliff
        with:
          config: .cliff.toml
          args: -vv --strip header --latest --no-exec --github-repo ${{ github.repository }}

  release:
    name: Release
    runs-on: ubuntu-24.04
    needs: changelog
    permissions:
      contents: write
    environment: release
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: false
          install: false

      - name: Set the release version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"

      - name: Set pre-release flag
        shell: bash
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          if [[ "$GIT_REF" == *alpha* ]] || [[ "$GIT_REF" == *beta* ]]; then
            echo "PRERELEASE_FLAG=--prerelease" >> "$GITHUB_ENV"
          else
            echo "PRERELEASE_FLAG=" >> "$GITHUB_ENV"
          fi

      - name: Create tarball
        id: package
        shell: bash
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: mise run package

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG_PATH: ${{ steps.package.outputs.PKG_PATH }}
          CHANGELOG: ${{ needs.changelog.outputs.release_body }}
        run: mise run release

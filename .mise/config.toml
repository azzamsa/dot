[tools]
stylua = "latest"
"aqua:Kampfkarren/selene" = "latest"
typos = "latest"
dprint = "latest"
actionlint = "latest"
zizmor = "latest"
shellcheck = "latest"
"cargo:nu-lint" = "latest"

[tasks.setup]
hide = true
confirm = "⚠️ This command will alter your system. Continue?"
description = "Setup the project"
depends = ["hooks"]

[tasks.audit]
# Extras, deep, thorough checks. Should be run locally.
hide = true
description = "Exhaustive quality check"
depends = ["check", "meta"]
run = "mise run --cd utils/snacks audit"

[tasks.fix]
# Apply automatic fixes, then check.
# Intended for use before commit or push.
description = "Enforce rules"
depends = ["fmt", "check"]
run = "mise run --cd utils/snacks verify"

[tasks.check]
# Quality check. Primarily used in CI.
hide = true
description = "Quality check"
depends = ["lint"]
run = "mise run --cd utils/snacks check"

[tasks.lint]
# Minimal, fast feedback checks.
hide = true
description = "Lint"
run = [
    # format
    "dprint check",
    "stylua . --allow-hidden --check",
    # lint
    "selene . --quiet",
    # typos
    "typos",

    "mise run --cd utils/snacks lint",
]

[tasks.fmt]
hide = true
description = "Format"
run = ["dprint fmt", "stylua . --allow-hidden"]

[tasks."lint:shell"]
hide = true
description = "Lint shell scripts"
run = ["grep -lE '^#!.*(bash|sh)$' bin/* .mise/tasks/* setups/scripts/* | xargs -r shellcheck"]

[tasks."lint:nu"]
hide = true
description = "Lint Nushell code"
run = "nu-lint bin/"

[tasks.publish]
alias = "p"
description = "Publish configs and binaries"
run = ["mise run --cd utils/snacks publish", "dotter deploy"]

[tasks.up]
hide = true
description = "Upgrade dependencies"
run = [
    "dprint config update",
    "mise run --cd utils/snacks up",
]

[tasks."check:extras"]
hide = true
interactive = true
description = "Dependency analysis"
run = [
    # Dependencies
    "pnpx actions-up",

    # GitHub CI
    "actionlint",
    "zizmor .github/workflows/*",

    "mise run --cd utils/snacks 'check:extras'",
]

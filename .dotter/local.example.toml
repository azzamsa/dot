includes = [".dotter/include/fedora.toml"]

packages = [
    # Shell
    "shell",
    "fish",
    "nushell",

    # Terminals
    "wezterm",
    "kitty",
    "ghostty",
    "starship",
    "atuin",
    # "zellij",

    # Fetchers
    "fastfetch",

    # Editor
    "helix",
    "neovide",
    "zed",

    # Scripts
    "bin",

    # VCS
    "git",
    "jj",

    # Utils
    "fontconfig",
    "gnupg",
    "yazi",
    # "lla",
    "eget",
    "jjui",
    # "sane-break" # sane-break doesn't work with symlink

    # Programming Languages
    "cargo",

    # Browsers
    # "tridactyl",
]

[variables]
multiplexer = "zellij"
editor = "hx"
terminal_font_size = 21.5

# Available theme can be found in shells/fish/colors.fish
theme = "modus_vivendi"

font = "Maple Mono NF"
# font = "0xProto Nerd Font"

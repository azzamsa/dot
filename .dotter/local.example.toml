includes = [".dotter/include/fedora.toml"]

packages = [
    # Shell
    "bash",
    "fish",
    "nushell",

    # Terminals
    "wezterm",
    "kitty",
    "ghostty",
    "alacritty",
    # "rio",

    "foot",
    "starship",
    "atuin",
    "zellij",

    # Fetchers
    "fastfetch",

    # Editor
    "helix",
    "neovide",
    # "zed", two way edits

    # Scripts
    "bin",

    # VCS
    "git",
    "jj",

    # Utils
    "fontconfig",
    "gnupg",
    "yazi",
    # "lla",
    "eget",
    "jjui",
    # "sane-break" # sane-break doesn't work with symlink
    "mise",
    "satty",
    "mpd",

    # Programming Languages
    "cargo",

    # Browsers
    # "tridactyl",

    # Window Managers
    "core",
    "niri",
    "dms",
    "matugen",
]

[variables]
user = "strider"
editor = "hx"
terminal_font_size = 23
atuin_server = "https://shell.me.com"
theme = "tokyo_black"
wm_theme = "mauve"

font = "JetBrains Mono"
terminal_font = "JetBrainsMono Nerd Font"
